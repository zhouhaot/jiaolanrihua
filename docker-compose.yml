version: '3.8'

services:
  # MongoDB数据库
  mongodb:
    image: mongo:6
    container_name: jiaolan-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 应用服务器
  app:
    build: .
    container_name: jiaolan-app
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "5173:5173"  # 开发服务器端口
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:password123@mongodb:27017
      CLIENT_URL: http://localhost:5173
      PORT: 3000
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    command: sh -c "npm run build && npm start"

  # 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: jiaolan-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app

volumes:
  mongodb_data: